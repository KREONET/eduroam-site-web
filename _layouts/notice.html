---
layout: default
---

<section class="page-hero">
  <div class="container">
    <p style="font-size:0.8rem; opacity:0.7; margin-bottom:6px;">
      <i class="fas fa-bullhorn mr-1"></i>공지사항
    </p>
    <h1 style="font-size:1.4rem;">{{ page.title_ko }}</h1>
    <p class="page-sub">{{ page.date | date: "%Y.%m.%d" }}</p>
  </div>
</section>

<div class="container content-section">
  <div class="section-card">
    <div style="font-size:0.95rem; line-height:1.9; color:#333;">
      {{ content }}
    </div>
    <hr style="margin-top:2rem;">
    <a href="{{ '/notices/' | relative_url }}" style="font-size:0.85rem; color:#888;">
      <i class="fas fa-arrow-left mr-1"></i>공지사항 목록으로
    </a>
  </div>
</div>
